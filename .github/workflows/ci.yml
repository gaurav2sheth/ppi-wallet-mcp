name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Syntax + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Syntax check (all JS)
        run: |
          for f in $(find . -name '*.js' -not -path './node_modules/*'); do
            node --check "$f"
          done

      - name: Unit tests (Vitest)
        run: npx vitest run
